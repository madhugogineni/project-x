name: project-x

services:
  db:
    profiles: ["local", "deployed"]
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - path: ./backend/.env.example
        required: true
      - path: ./backend/.env
        required: false
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    profiles: ["local"]
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    command:
      [
        "sh",
        "-lc",
        "export CONTINUUM_DATABASE_URL=\"postgresql+asyncpg://$${POSTGRES_USER}:$${POSTGRES_PASSWORD}@db:5432/$${POSTGRES_DB}\" && uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload --app-dir src --no-access-log",
      ]
    env_file:
      - path: ./backend/.env.example
        required: true
      - path: ./backend/.env
        required: false
    ports:
      - "8020:8000"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/system/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    profiles: ["local"]
    build:
      context: ./app
      dockerfile: Dockerfile
      target: deps
    command: npm run dev:poll -- --hostname 0.0.0.0
    env_file:
      - path: ./app/.env.example
        required: true
      - path: ./app/.env
        required: false
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3021:3001"
    volumes:
      - ./app:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
    depends_on:
      backend:
        condition: service_started

  site:
    profiles: ["local"]
    build:
      context: ./site
      dockerfile: Dockerfile
      target: deps
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    env_file:
      - path: ./site/.env.example
        required: true
      - path: ./site/.env
        required: false
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3020:3000"
    volumes:
      - ./site:/app
      - site_node_modules:/app/node_modules
      - site_next:/app/.next
    depends_on:
      app:
        condition: service_started

  backend-prod:
    profiles: ["deployed"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command:
      [
        "sh",
        "-lc",
        "export CONTINUUM_DATABASE_URL=\"postgresql+asyncpg://$${POSTGRES_USER}:$${POSTGRES_PASSWORD}@db:5432/$${POSTGRES_DB}\" && uvicorn main:app --host 0.0.0.0 --port 8000 --app-dir src --no-access-log",
      ]
    env_file:
      - path: ./backend/.env.example
        required: true
      - path: ./backend/.env
        required: false
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/system/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  app-prod:
    profiles: ["deployed"]
    build:
      context: ./app
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./app/.env.example
        required: true
      - path: ./app/.env
        required: false
    ports:
      - "3001:3001"
    depends_on:
      backend-prod:
        condition: service_started

  site-prod:
    profiles: ["deployed"]
    build:
      context: ./site
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./site/.env.example
        required: true
      - path: ./site/.env
        required: false
    ports:
      - "3000:3000"
    depends_on:
      app-prod:
        condition: service_started

volumes:
  app_next:
  app_node_modules:
  backend_venv:
  pgdata:
  site_next:
  site_node_modules:
